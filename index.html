<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mesai Takip Pro v9.3</title>
    <style>
        :root { 
            --blue: #0984e3; --orange: #f39c12; --bg: #121212; 
            --panel: #1e1e1e; --text: #e0e0e0; --green: #2ecc71; 
            --red: #ff4757; --accent: #00cec9; 
        }
        
        html, body { 
            height: 100%; margin: 0; padding: 0; overflow: hidden; 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; 
        }
        olan
        .header-brand { 
            display: flex; align-items: center; padding: 0 10px; 
            background: var(--panel); border-bottom: 2px solid #333; height: 80px; flex-shrink: 0;
        }
        .app-logo { height: 110px; margin-right: 20px; }
        .app-title { font-size: 20px; font-weight: bold; color: var(--blue); }

        .mode-selector { 
            display: grid; grid-template-columns: repeat(6, 1fr); gap: 3px; 
            padding: 5px; background: #1a1a1a; flex-shrink: 0;
        }
        .mode-btn { 
            padding: 6px 0; border-radius: 4px; background: #333; color: #fff; 
            font-size: 9px; text-align: center; border: 1px solid #444; 
        }
        .mode-btn.active { background: var(--blue); border-color: #fff; }

        .nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 4px 15px; background: #252525; flex-shrink: 0;
        }
        .btn-nav { color: var(--blue); font-weight: bold; padding: 2px 8px; border: 2px solid var(--blue); border-radius: 4px; font-size: 11px; }

        .calendar { padding: 1px; flex-shrink: 1; overflow: hidden; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: #333; }
        .weekday { text-align: center; font-size: 8px; padding: 15px 0; color: #fff; background: var(--blue); }
        
        /* GÜN KUTUCUĞU TEMEL STİL */
        .day { 
            background: #ecf0f1; color: #2d3436; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; position: relative; 
            border: 1px solid #bdc3c7; height: 35px; 
        }
        
        /* PAZAR GÜNLERİ */
        .day.pazar { background: #3498db !important; color: #fff !important; }
        
        /* RESMİ TATİLLER (KIRMIZI) */
        .day.holiday { background: #ff4757 !important; color: #fff !important; }
        
        /* BUGÜNÜN İŞARETİ */
        .day.today { border: 3px solid var(--orange) !important; box-shadow: inset 0 0 8px rgba(243, 156, 18, 0.6); }
        .day.today .day-num { color: #d35400; font-size: 13px; }
        
        .day-num { font-weight: bold; font-size: 11px; }
        .day-info { font-size: 7px; color: #b71505; font-weight: bold; }
        .day.empty { background: #2a2a2a !important; border: none; }

        .salary-panel {
            background: #252525; margin: 4px; padding: 8px; border-radius: 8px;
            border-left: 4px solid var(--blue); flex-shrink: 0;
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }
       .input-group { 
    display: flex; 
    flex-direction: column; 
}

.input-group { 
    display: flex; 
    flex-direction: column; 
}

.input-group label { 
    font-size: 10px; 
    color: var(--accent); 
    font-weight: bold; 
    margin-bottom: 2px; 
}

.modern-input {
    background: #fff; 
    color: #000; 
    border: 8px solid #444; 
    padding: 4px; 
    border-radius: 8px; 
    font-weight: bold; 
    text-align: center; 
    
    /* Önemli kısımlar */
    box-sizing: border-box; /* Border ve padding'i 35px'in içine hapseder */
    height: 35px; 
    font-size: 20px; /* Burayı dilediğin kadar büyütebilirsin */
    line-height: 2;  /* Yazının satır yüksekliğini kutuyla uyumlu tutar */
}

.multiplier-box {
    display: grid; 
    grid-template-columns: repeat(6, 1fr); 
    gap: 10px; 
    padding: 0 4px; 
    flex-shrink: 0;
}

.multiplier-box input {
    width: 100%; 
    padding: 4px 0; 
    border-radius: 4px; 
    border: 3px solid #444; 
    background: #1a1a1a; 
    color: var(--accent); 
    text-align: center; 
    
    /* Önemli kısımlar */
    box-sizing: border-box;
    font-size: 18px; /* Orijinal 13px idi, burayı büyüttük */
}
        .stats { 
            background: var(--orange); color: #000; padding: 10px; margin: 6px; 
            border-radius: 10px; text-align: center; flex-shrink: 0;
        }
        .sums-line { font-size: 12px; font-weight: bold; opacity: 0.8; }
        .mesai-line { font-size: 16px; font-weight: bold; color: #b71505; margin: 5px 0; }
        .total-line { font-size: 20px; font-weight: bold; border-top: 3px solid rgba(0,0,0,0.1); }
        
        .save-btn { 
            background: var(--green); color: white; width: calc(100% - 8px); 
            padding: 12px; border: none; border-radius: 8px; font-weight: bold; 
            margin: 0 6px 8px 6px; flex-shrink: 0; font-size: 15px;
        }
        .clear-btn { position: absolute; top: 0; right: 0; color: var(--red); font-size: 9px; background: #fff; border-radius: 50%; width: 12px; height: 12px; display: flex; align-items: center; justify-content: center; border: none; }
    </style>
</head>
<body>

<div class="header-brand">
    <img src="https://i.ibb.co/DFkxCCC/file-00000000d6d4720a84a62a8e60923d43.png" alt="Logo" class="app-logo">
    <span class="app-title">MESAİ TAKİP PRO</span>
</div>

<div class="mode-selector">
    <div class="mode-btn active" id="btnr50" onclick="setMode('r50')">%50</div>
    <div class="mode-btn" id="btnr65" onclick="setMode('r65')">%65</div>
    <div class="mode-btn" id="btnr75" onclick="setMode('r75')">%75</div>
    <div class="mode-btn" id="btnr100" onclick="setMode('r100')">%100</div>
    <div class="mode-btn" id="btnr200" onclick="setMode('r200')">%200</div>
    <div class="mode-btn" id="btnrX" onclick="setMode('rX')">ÖZEL</div>
</div>

<div class="nav">
    <div class="btn-nav" onclick="changeMonth(-1)">◀</div>
    <div id="monthLabel" style="font-weight:bold; font-size: 12px;"></div>
    <div class="btn-nav" onclick="changeMonth(1)">▶</div>
</div>

<div class="calendar">
    <div class="grid">
        <div class="weekday">Pz</div><div class="weekday">Sa</div><div class="weekday">Ça</div>
        <div class="weekday">Pe</div><div class="weekday">Cu</div><div class="weekday">Ct</div><div class="weekday">Pa</div>
    </div>
    <div id="calendarGrid" class="grid"></div>
</div>

<div class="salary-panel">
    <div class="input-group">
        <label>NET MAAŞ</label>
        <input type="number" id="salary" class="modern-input" placeholder="0" oninput="calc()">
    </div>
    <div class="input-group">
        <label>SAAT ÜCRETİ</label>
        <input type="number" id="hRate" class="modern-input" placeholder="0" oninput="calc()">
    </div>
</div>

<div class="multiplier-box">
    <input type="number" id="c50" value="1.5" step="0.05" oninput="calc()">
    <input type="number" id="c65" value="1.65" step="0.05" oninput="calc()">
    <input type="number" id="c75" value="1.75" step="0.05" oninput="calc()">
    <input type="number" id="c100" value="2.0" step="0.05" oninput="calc()">
    <input type="number" id="c200" value="3.0" step="0.05" oninput="calc()">
    <input type="number" id="cX" value="2.5" oninput="calc()">
</div>

<div class="stats">
    <div id="sums" class="sums-line">H: 0|0|0|0|0|0</div>
    <div class="mesai-line">Mesai Kazancı: <span id="pureMesai">0</span> TL</div>
    <div class="total-line">TOPLAM: <span id="totalFinal">0</span> TL</div>
</div>

<button class="save-btn" onclick="saveAll()">VERİLERİ KAYDET</button>

<script>
    let m = new Date().getMonth(), y = new Date().getFullYear();
    let data = JSON.parse(localStorage.getItem('mesai_v8_db')) || {};
    let activeMode = 'r50';

    // 2026 Resmi Tatilleri (G-A formatında)
    const holidays = [
        "1-0", "19-2", "20-2", "21-2", "23-3", "1-4", "19-4", 
        "26-4", "27-4", "28-4", "29-4", "15-6", "30-7", "29-9"
    ];

    function setMode(mode) {
        activeMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn' + mode).classList.add('active');
    }

    function render() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        const names = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
        document.getElementById('monthLabel').innerText = names[m] + " " + y;

        const today = new Date();
        const tDay = today.getDate(), tMonth = today.getMonth(), tYear = today.getFullYear();

        let first = new Date(y, m, 1).getDay();
        first = (first === 0) ? 6 : first - 1;
        let days = new Date(y, m + 1, 0).getDate();

        for(let i=0; i<first; i++) grid.innerHTML += '<div class="day empty"></div>';

        for(let d=1; d<=days; d++) {
            let key = `${d}-${m}-${y}`;
            let holidayKey = `${d}-${m}`;
            let isPazar = new Date(y, m, d).getDay() === 0;
            let isToday = (d === tDay && m === tMonth && y === tYear);
            let isHoliday = holidays.includes(holidayKey);
            
            let info = "";
            if(data[key]) {
                const it = data[key];
                if(it.r50) info += `${it.r50} `;
                if(it.r65) info += `${it.r65} `;
                if(it.r75) info += `${it.r75} `;
                if(it.r100) info += `${it.r100} `;
                if(it.r200) info += `${it.r200} `;
                if(it.rX) info += `Ö:${it.rX}`;
            }

            // Önce Pazar, sonra Tatil kontrolü ile sınıfları ekliyoruz
            grid.innerHTML += `
                <div class="day ${isPazar?'pazar':''} ${isHoliday?'holiday':''} ${isToday?'today':''}" onclick="quickEntry(${d})">
                    <span class="day-num">${d}</span>
                    <div class="day-info">${info}</div>
                    ${data[key] ? `<button class="clear-btn" onclick="event.stopPropagation(); clearDay(${d})">×</button>` : ''}
                </div>`;
        }
        calc();
    }

    function quickEntry(d) {
        let key = `${d}-${m}-${y}`;
        if(!data[key]) data[key] = {r50:0, r65:0, r75:0, r100:0, r200:0, rX:0};
        let val = prompt(`${d} Günü (${activeMode.replace('r','%')}):`, data[key][activeMode] || "");
        if(val !== null) {
            data[key][activeMode] = parseFloat(val.replace(',', '.')) || 0;
            render();
        }
    }

    function clearDay(d) {
        if(confirm(`${d} temizlensin mi?`)) {
            delete data[`${d}-${m}-${y}`];
            render();
        }
    }

    function calc() {
        let sal = parseFloat(document.getElementById('salary').value) || 0;
        let hr = parseFloat(document.getElementById('hRate').value) || (sal > 0 ? sal / 225 : 0);
        let v50 = parseFloat(document.getElementById('c50').value) || 0, v65 = parseFloat(document.getElementById('c65').value) || 0;
        let v75 = parseFloat(document.getElementById('c75').value) || 0, v100 = parseFloat(document.getElementById('c100').value) || 0;
        let v200 = parseFloat(document.getElementById('c200').value) || 0, vX = parseFloat(document.getElementById('cX').value) || 0;

        let t50=0, t65=0, t75=0, t100=0, t200=0, tX=0;
        for(let k in data) {
            let p = k.split('-');
            if(parseInt(p[1]) === m && parseInt(p[2]) === y) {
                t50 += data[k].r50 || 0; t65 += data[k].r65 || 0;
                t75 += data[k].r75 || 0; t100 += data[k].r100 || 0;
                t200 += data[k].r200 || 0; tX += data[k].rX || 0;
            }
        }
        document.getElementById('sums').innerText = `H: ${t50}|${t65}|${t75}|${t100}|${t200}|${tX}`;
        let kazanc = (t50*hr*v50) + (t65*hr*v65) + (t75*hr*v75) + (t100*hr*v100) + (t200*hr*v200) + (tX*hr*vX);
        document.getElementById('pureMesai').innerText = Math.round(kazanc).toLocaleString('tr-TR');
        document.getElementById('totalFinal').innerText = Math.round(sal + kazanc).toLocaleString('tr-TR');
    }

    function changeMonth(i) { m += i; if(m>11){m=0;y++} if(m<0){m=11;y--} render(); }

    function saveAll() {
        localStorage.setItem('mesai_v8_db', JSON.stringify(data));
        localStorage.setItem('l_sal8', document.getElementById('salary').value);
        localStorage.setItem('l_hr8', document.getElementById('hRate').value);
        alert("Başarıyla Kaydedildi!");
    }

    window.onload = function() {
        document.getElementById('salary').value = localStorage.getItem('l_sal8') || "";
        document.getElementById('hRate').value = localStorage.getItem('l_hr8') || "";
        render();
    };
</script>
</body>
</html>
