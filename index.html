<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesai Takip</title>
    <style>
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
        }
        .logo {
            height: 50px; /* Increased height */
        }
        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px; /* Improved spacing */
            border-radius: 8px; /* Rounded corners */
            overflow: hidden;
        }
        .day-cell {
            height: auto; /* Let content dictate height, optimized for mobile */
            padding: 5px; /* Adjusted padding */
        }
        @media (max-width: 600px) {
            .day-cell {
                padding: 2px; /* Further padding adjustments for mobile */
            }
        }
    </style>
</head>
<body>
    <header>
        <img class="logo" src="logo.png" alt="Logo">
    </header>
    <main>
        <div class="calendar">
            <div class="day-cell">1</div>
            <div class="day-cell">2</div>
            <div class="day-cell">3</div>
            <div class="day-cell">4</div>
            <div class="day-cell">5</div>
            <div class="day-cell">6</div>
            <div class="day-cell">7</div>
            <!-- More days... -->
        </div>
    </main>
</body>
</html>
